<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80">
  <!-- Logo Icon (Circle with microscope and Africa) -->
  <g transform="translate(8, 8)">
    <!-- Green circle background with gradient effect -->
    <defs>
      <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#2d8f47;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#1a7d3e;stop-opacity:1" />
      </linearGradient>
    </defs>
    <circle cx="32" cy="32" r="30" fill="url(#greenGradient)"/>
    
    <!-- Africa continent silhouette (white) - more detailed shape -->
    <path d="M36 14 
             C40 14, 46 16, 50 20
             C52 18, 56 20, 58 24
             C60 27, 60 32, 58 36
             C56 40, 52 44, 48 48
             C44 52, 40 54, 36 54
             C32 54, 28 52, 24 48
             C20 44, 18 40, 18 36
             C16 32, 18 28, 22 24
             C26 20, 30 16, 36 14Z" 
          fill="white"/>
    
    <!-- Microscope (white) - detailed design -->
    <g fill="white">
      <!-- Microscope base -->
      <ellipse cx="18" cy="50" rx="10" ry="3"/>
      <!-- Microscope stand/arm -->
      <path d="M14 48 L14 32 Q14 26 20 24 L26 20" 
            stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- Microscope body -->
      <rect x="22" y="12" width="5" height="14" rx="2" transform="rotate(-25 24.5 19)"/>
      <!-- Eyepiece -->
      <rect x="24" y="8" width="4" height="7" rx="1" transform="rotate(-25 26 11.5)"/>
      <!-- Objective lens -->
      <circle cx="30" cy="26" r="3"/>
      <!-- Stage -->
      <rect x="24" y="32" width="10" height="2" rx="1"/>
      <!-- Focus knob -->
      <circle cx="16" cy="36" r="2"/>
    </g>
    
    <!-- Sparkles/dots around microscope -->
    <circle cx="12" cy="20" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="16" cy="14" r="1" fill="white" opacity="0.6"/>
    <circle cx="54" cy="22" r="1.5" fill="white" opacity="0.7"/>
    <circle cx="56" cy="38" r="1" fill="white" opacity="0.5"/>
    <circle cx="50" cy="50" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="22" cy="10" r="1" fill="white" opacity="0.4"/>
    <circle cx="48" cy="16" r="1" fill="white" opacity="0.5"/>
  </g>
  
  <!-- SciAfrica Text - matching the style in your reference -->
  <text x="80" y="52" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="bold" fill="#1a7d3e" letter-spacing="-1">SciAfrica</text>
</svg>
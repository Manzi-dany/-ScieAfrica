<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Green circle background -->
  <circle cx="50" cy="50" r="48" fill="#1a7d3e"/>
  
  <!-- Africa continent silhouette (white) -->
  <path d="M50 25 
           C55 25, 60 28, 62 32
           C65 30, 70 32, 72 36
           C75 38, 75 42, 73 45
           C75 48, 74 52, 72 55
           C70 58, 68 60, 65 62
           C62 65, 58 68, 55 70
           C52 72, 48 72, 45 70
           C42 68, 40 65, 38 62
           C35 60, 33 58, 32 55
           C30 52, 30 48, 32 45
           C30 42, 32 38, 35 36
           C38 32, 42 30, 45 28
           C48 26, 50 25, 50 25Z" 
        fill="white"/>
  
  <!-- Microscope (white) -->
  <g fill="white">
    <!-- Microscope base -->
    <rect x="22" y="68" width="20" height="4" rx="2"/>
    <!-- Microscope arm -->
    <path d="M28 68 L28 45 Q28 40 32 38 L38 35" 
          stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Microscope eyepiece -->
    <rect x="35" y="28" width="4" height="10" rx="1" transform="rotate(-15 37 33)"/>
    <!-- Microscope objective lens -->
    <circle cx="42" cy="42" r="3"/>
    <!-- Stage -->
    <rect x="38" y="48" width="12" height="2" rx="1"/>
    <!-- Focus knobs -->
    <circle cx="30" cy="50" r="2"/>
  </g>
  
  <!-- Decorative dots (representing molecules/atoms) -->
  <circle cx="25" cy="35" r="2" fill="white" opacity="0.8"/>
  <circle cx="30" cy="28" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="70" cy="40" r="2" fill="white" opacity="0.7"/>
  <circle cx="75" cy="50" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="68" cy="65" r="2" fill="white" opacity="0.6"/>
</svg>
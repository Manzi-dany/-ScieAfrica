<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <!-- Logo Icon (Circle with microscope and Africa) -->
  <g transform="translate(10, 10)">
    <!-- Green circle background -->
    <circle cx="40" cy="40" r="38" fill="#1a7d3e"/>
    
    <!-- Africa continent silhouette (white) - positioned on right side of circle -->
    <path d="M45 20 
             C50 20, 58 22, 62 28
             C65 26, 70 28, 72 32
             C74 35, 74 40, 72 44
             C70 48, 66 52, 62 55
             C58 60, 52 65, 48 68
             C44 70, 40 70, 36 68
             C32 65, 28 60, 26 55
             C24 52, 24 48, 26 44
             C28 40, 32 36, 36 32
             C40 28, 42 24, 45 20Z" 
          fill="white"/>
    
    <!-- Microscope (white) - positioned on left side -->
    <g fill="white">
      <!-- Microscope base/platform -->
      <rect x="12" y="58" width="20" height="3" rx="1.5"/>
      <!-- Microscope arm/stand -->
      <path d="M18 58 L18 38 Q18 32 24 30 L30 26" 
            stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Microscope body tube -->
      <rect x="26" y="18" width="5" height="12" rx="1" transform="rotate(-20 28.5 24)"/>
      <!-- Eyepiece -->
      <rect x="28" y="14" width="3" height="6" rx="0.5" transform="rotate(-20 29.5 17)"/>
      <!-- Objective lens -->
      <circle cx="35" cy="32" r="2.5"/>
      <!-- Stage (where slide sits) -->
      <rect x="28" y="38" width="10" height="1.5" rx="0.5"/>
      <!-- Focus adjustment knob -->
      <circle cx="20" cy="42" r="1.5"/>
    </g>
    
    <!-- Decorative dots/molecules -->
    <circle cx="15" cy="25" r="1.5" fill="white" opacity="0.7"/>
    <circle cx="20" cy="18" r="1" fill="white" opacity="0.5"/>
    <circle cx="68" cy="28" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="72" cy="45" r="1" fill="white" opacity="0.4"/>
    <circle cx="65" cy="62" r="1.5" fill="white" opacity="0.5"/>
  </g>
  
  <!-- SciAfrica Text -->
  <text x="100" y="62" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#1a7d3e">SciAfrica</text>
</svg>